name: smart_parking
description: "A new Flutter project."

# Prevent accidental publishing to pub.dev.
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.5.3

dependencies:
  channel: ^2.0.2
  cloud_firestore: ^5.6.3
  csv: ^7.1.0
  english_words: ^4.0.0
  firebase_auth: ^5.3.3
  firebase_core: ^3.8.0
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  fluttertoast: ^8.2.12
  geocoding: ^3.0.0
  google_fonts: ^6.2.1
  google_maps_flutter: ^2.9.0
  google_places_flutter: ^2.1.0
  http: ^1.2.2
  mysql1: ^0.20.0
  provider: ^6.1.2
  shared_preferences: ^2.5.4
  url_launcher: ^6.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true

  # Enable generation of localized Strings from arb files.
  generate: true

  assets:
    # Add assets from the images directory to the application.
    - assets/images/JMU-Logo-RGB-vert-white.png
    - assets/images/ballard.png
    - assets/images/grace.png
    - assets/images/warsaw.png
    - assets/images/chesapeake.png
    - assets/images/champions.png
    - assets/images/mason.png
    - assets/events/special_events2.csv
